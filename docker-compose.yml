services:
  postgres:
    image: postgres:16
    container_name: auto-web-novel-db
    restart: unless-stopped
    ports:
      # host:container — host 측은 5433 (5432는 별 컨테이너가 점유 중인 환경 대응)
      - "5433:5432"
    environment:
      POSTGRES_DB: auto_web_novel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auto_web_novel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
